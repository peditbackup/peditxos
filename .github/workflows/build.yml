name: 'PeDitXOS Firmware Builder'

on:
  workflow_dispatch:
    inputs:
      user_id:
        description: 'Firebase User ID'
        required: true
        type: string
      build_id:
        description: 'Firestore Build ID'
        required: true
        type: string
      device_target:
        description: 'Device Target (e.g., x86/64, ipq40xx/generic)'
        required: true
        type: string
      device_profile:
        description: 'Device Profile'
        required: true
        type: string
      target_arch:
        description: 'Target Architecture (e.g., x86_64, aarch64_cortex-a53)'
        required: true
        type: string
      openwrt_version:
        description: 'OpenWrt Version (e.g., 24.10.0, 25.12.0, snapshot)'
        required: true
        type: string
      extra_packages:
        description: 'Extra packages (space separated)'
        required: false
        type: string
      theme_choice:
        description: 'Selected LuCI theme'
        required: true
        type: choice
        options:
          - luci-theme-peditx
          - luci-theme-carbonpx
      lan_ip:
        description: 'Custom LAN IP address'
        required: false
        type: string
      wifi_24_enabled:
        description: 'Enable 2.4GHz WiFi'
        required: false
        type: boolean
        default: true

jobs:
  build_firmware:
    name: Build Firmware
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Detect Package Manager & Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y wget tar make coreutils rsync openssh-client curl jq zstd unzip lftp zip
          
          VERSION_INPUT="${{ github.event.inputs.openwrt_version }}"
          IS_APK=false
          
          # Robust detection for OpenWrt 24.10+, 25.x, 26.x and Snapshots
          if [[ "$VERSION_INPUT" == *"snapshot"* || "$VERSION_INPUT" == *"master"* ]]; then
            IS_APK=true
          elif [[ "$VERSION_INPUT" =~ ^([0-9]+)\.([0-9]+) ]]; then
            MAJOR="${BASH_REMATCH[1]}"
            MINOR="${BASH_REMATCH[2]}"
            if [ "$MAJOR" -gt 24 ] || { [ "$MAJOR" -eq 24 ] && [ "$MINOR" -ge 10 ]; }; then
              IS_APK=true
            fi
          fi
          
          echo "IS_APK=${IS_APK}" >> $GITHUB_ENV
          echo "::notice::Detected Package Manager: $([ "$IS_APK" = "true" ] && echo "APK (Modern)" || echo "OPKG (Legacy)")"
          
          if [ "$IS_APK" = "true" ]; then
            echo "Setting up APK tools wrapper..."
            APK_URL="http://dl-cdn.alpinelinux.org/alpine/v3.20/main/x86_64/apk-tools-static-2.14.4-r0.apk"
            wget -qO /tmp/apk-static.apk "$APK_URL"
            tar -xf /tmp/apk-static.apk -C /tmp sbin/apk.static
            sudo mv /tmp/sbin/apk.static /usr/local/bin/apk-real
            sudo chmod +x /usr/local/bin/apk-real
            
            sudo bash -c 'cat > /usr/local/bin/apk << EOF_WRAPPER
#!/bin/sh
exec /usr/local/bin/apk-real --no-sandbox "\$@"
EOF_WRAPPER'
            sudo chmod +x /usr/local/bin/apk
            echo "APK_EXT=apk" >> $GITHUB_ENV
          else
            echo "APK_EXT=ipk" >> $GITHUB_ENV
          fi

      - name: Download and Extract OpenWrt ImageBuilder
        id: download_ib
        run: |
          TARGET_DIR_URL="http://downloads.openwrt.org/releases/${{ github.event.inputs.openwrt_version }}/targets/${{ github.event.inputs.device_target }}"
          IMAGEBUILDER_FILENAME=$(curl -sL "${TARGET_DIR_URL}/" | grep -oE 'href="[^"]*imagebuilder[^"]*\.(tar\.xz|tar\.zst)"' | head -n 1 | sed 's/href="//;s/"//')
          
          if [ -z "$IMAGEBUILDER_FILENAME" ]; then
            echo "::error::Could not find ImageBuilder at ${TARGET_DIR_URL}"
            exit 1
          fi
          
          echo "Downloading: ${IMAGEBUILDER_FILENAME}"
          wget -q "${TARGET_DIR_URL}/${IMAGEBUILDER_FILENAME}"
          mkdir -p imagebuilder
          tar -xf "${IMAGEBUILDER_FILENAME}" --strip-components=1 -C imagebuilder
          echo "IMAGEBUILDER_FILENAME=${IMAGEBUILDER_FILENAME}" >> $GITHUB_OUTPUT

      - name: Prepare ImageBuilder Environment
        run: |
          IMAGEBUILDER_DIR="imagebuilder"
          echo "IMAGEBUILDER_DIR=${IMAGEBUILDER_DIR}" >> $GITHUB_ENV
          # CRITICAL FIX: Export TARGET_ARCH so download step can use it
          echo "TARGET_ARCH=${{ github.event.inputs.target_arch }}" >> $GITHUB_ENV
          
          # Disable signature checks for both OPKG and APK
          find "${IMAGEBUILDER_DIR}" -maxdepth 3 -type f \( -name "repositories.conf" -o -name "apk.conf" \) -exec sed -i 's/^option check_signature.*/option check_signature 0/' {} \; 2>/dev/null || true
          
          # Register Passwall key via HTTP
          wget -qO /tmp/passwall.pub http://repository.peditxos.ir/openwrt-passwall-build/passwall.pub || true
          if [ -f /tmp/passwall.pub ]; then
            find "${IMAGEBUILDER_DIR}" -type d -name "keys" -exec cp /tmp/passwall.pub {}/passwall.pub \; 2>/dev/null || true
            mkdir -p "${IMAGEBUILDER_DIR}/etc/apk/keys"
            cp /tmp/passwall.pub "${IMAGEBUILDER_DIR}/etc/apk/keys/passwall.pub"
          fi
          
          # Replace staging_dir apk binaries with wrapper if needed
          if [ "${{ env.IS_APK }}" = "true" ]; then
            find "${IMAGEBUILDER_DIR}/staging_dir" -type f -name "apk" -executable -exec cp /usr/local/bin/apk {} \; 2>/dev/null || true
          fi

      - name: Prepare Custom Files and Scripts
        run: |
          FILES_DIR="${{ github.workspace }}/files"
          mkdir -p "${FILES_DIR}/etc"
          OPENWRT_RELEASE_BASE=$(echo "${{ github.event.inputs.openwrt_version }}" | cut -d. -f1-2)
          TARGET_ARCH_VAR="${{ github.event.inputs.target_arch }}"
          
          # Custom Repositories (HTTP as preferred)
          if [ "${{ env.IS_APK }}" = "true" ]; then
            mkdir -p "${FILES_DIR}/etc/apk"
            cat > "${FILES_DIR}/etc/apk/repositories" << EOF
http://repository.peditxos.ir/openwrt/releases/${{ github.event.inputs.openwrt_version }}/packages/%a/base
http://repository.peditxos.ir/openwrt/releases/${{ github.event.inputs.openwrt_version }}/packages/%a/luci
http://repository.peditxos.ir/openwrt/releases/${{ github.event.inputs.openwrt_version }}/packages/%a/packages
http://repository.peditxos.ir/openwrt/releases/${{ github.event.inputs.openwrt_version }}/packages/%a/routing
http://repository.peditxos.ir/openwrt/releases/${{ github.event.inputs.openwrt_version }}/packages/%a/telephony
http://repository.peditxos.ir/openwrt-passwall-build/releases/packages-${OPENWRT_RELEASE_BASE}/%a/passwall_luci
http://repository.peditxos.ir/openwrt-passwall-build/releases/packages-${OPENWRT_RELEASE_BASE}/%a/passwall_packages
http://repository.peditxos.ir/openwrt-passwall-build/releases/packages-${OPENWRT_RELEASE_BASE}/%a/passwall2
EOF
          else
            mkdir -p "${FILES_DIR}/etc/opkg"
            BASE_URL="http://repository.peditxos.ir/openwrt-passwall-build/releases/packages-${OPENWRT_RELEASE_BASE}/${TARGET_ARCH_VAR}"
            cat > "${FILES_DIR}/etc/opkg/customfeeds.conf" << EOF
# PeDitXOS Custom Feeds
src/gz peditxos_passwall_luci ${BASE_URL}/passwall_luci
src/gz peditxos_passwall_pkgs ${BASE_URL}/passwall_packages
src/gz peditxos_passwall2 ${BASE_URL}/passwall2
EOF
          fi
          
          # Branding
          cat > "${FILES_DIR}/etc/os-release" << EOF
NAME='PeDitXOS'
VERSION='${{ github.event.inputs.openwrt_version }}'
ID='peditxos'
ID_LIKE='openwrt'
PRETTY_NAME='PeDitXOS (${{ github.event.inputs.openwrt_version }})'
VERSION_ID='${{ github.event.inputs.openwrt_version }}'
HOME_URL='http://sourceforge.net/projects/peditxos/'
SUPPORT_URL='http://t.me/peditx'
BUG_REPORT_URL='http://t.me/peditx'
OPENWRT_BOARD='${{ github.event.inputs.device_target }}'
OPENWRT_ARCH='${TARGET_ARCH_VAR}'
OPENWRT_TAINTS='no-all'
OPENWRT_RELEASE='PeDitXOS (${{ github.event.inputs.openwrt_version }})'
EOF

          # UCI Defaults Script
          mkdir -p "${FILES_DIR}/etc/uci-defaults"
          UCI_SCRIPT="${FILES_DIR}/etc/uci-defaults/99-peditxos-settings"
          THEME_NAME=$(echo "${{ github.event.inputs.theme_choice }}" | sed 's/luci-theme-//')
          
          cat > "${UCI_SCRIPT}" << 'EOF_STATIC'
#!/bin/sh
# Disable OPKG signature check
[ -f /etc/opkg.conf ] && sed -i 's/option check_signature/# option check_signature/g' /etc/opkg.conf

# Redirect mirrors to HTTP
[ -f /etc/opkg/distfeeds.conf ] && sed -i 's|https://downloads.openwrt.org|http://repository.peditxos.ir/openwrt|g; s|http://downloads.openwrt.org|http://repository.peditxos.ir/openwrt|g' /etc/opkg/distfeeds.conf
[ -f /etc/apk/repositories ] && sed -i 's|https://downloads.openwrt.org|http://repository.peditxos.ir/openwrt|g; s|http://downloads.openwrt.org|http://repository.peditxos.ir/openwrt|g' /etc/apk/repositories

# Register passwall public key
mkdir -p /etc/apk/keys
wget -qO /tmp/passwall.pub http://repository.peditxos.ir/openwrt-passwall-build/passwall.pub \
  && opkg-key add /tmp/passwall.pub > /dev/null 2>&1 \
  && cp /tmp/passwall.pub /etc/apk/keys/passwall.pub \
  && rm -f /tmp/passwall.pub \
  || echo "Warning: Could not register passwall public key"
EOF_STATIC

          cat >> "${UCI_SCRIPT}" << EOF_UCI
# System Settings
uci -q batch << UCIEOF
set system.@system[0].hostname='PeDitXOS'
set system.@system[0].description='PeDitXOS (Built for ${{ github.event.inputs.device_profile }})'
set system.@system[0].timezone='Asia/Tehran'
set system.@system[0].zonename='IRT+3:30'
set system.@system[0].ntpserver='ir.pool.ntp.org time.cloudflare.com'
set network.wan.dns='8.8.8.8 8.8.4.4'
set luci.main.mediaurlbase='/luci-static/${THEME_NAME}'
UCIEOF
EOF_UCI

          # Conditional LAN IP
          if [ -n "${{ github.event.inputs.lan_ip }}" ]; then
            cat >> "${UCI_SCRIPT}" << EOF_LAN
uci -q batch << UCIEOF
set network.lan.ipaddr='${{ github.event.inputs.lan_ip }}'
set dhcp.lan.start='100'
set dhcp.lan.limit='150'
set dhcp.lan.interface='lan'
UCIEOF
EOF_LAN
          fi
          
          # WiFi State
          if [ "${{ github.event.inputs.wifi_24_enabled }}" = "false" ]; then
            echo "uci set wireless.radio0.disabled='1'" >> "${UCI_SCRIPT}"
          else
            echo "uci set wireless.radio0.disabled='0'" >> "${UCI_SCRIPT}"
          fi
          
          cat >> "${UCI_SCRIPT}" << 'EOF_FINAL'
uci commit
rm -rf /tmp/luci-cache/*
service uhttpd restart 2>/dev/null || /etc/init.d/uhttpd restart 2>/dev/null || true
/sbin/reload_config
EOF_FINAL
          chmod +x "${UCI_SCRIPT}"

      - name: Download Custom Packages
        env:
          GITHUB_API_TOKEN: ${{ github.token }}
        run: |
          CUSTOM_PKG_DIR="${{ env.IMAGEBUILDER_DIR }}/packages"
          mkdir -p "${CUSTOM_PKG_DIR}"
          PKG_EXT="${{ env.APK_EXT }}"
          TARGET_ARCH="${{ env.TARGET_ARCH }}"
          
          download_latest_pkg() {
            local REPO="$1" SEARCH_PATTERN="$2" ARCH_PATTERN="$3"
            echo "--> Fetching latest from ${REPO} matching '${SEARCH_PATTERN}'..."
            local API_URL="https://api.github.com/repos/${REPO}/releases/latest"
            local RESPONSE=$(curl -sL -H "Authorization: Bearer ${GITHUB_API_TOKEN}" "$API_URL")
            
            if ! echo "$RESPONSE" | jq -e '.assets' > /dev/null 2>&1; then
              echo "::error::No releases or invalid API response for ${REPO}"
              return 1
            fi
            
            local URL=""
            if [ -n "$ARCH_PATTERN" ]; then
              URL=$(echo "$RESPONSE" | jq -r \
                --arg PAT "${SEARCH_PATTERN}" --arg ARCH "${ARCH_PATTERN}" --arg EXT "$PKG_EXT" \
                '.assets[] | select(.name | contains($PAT) and contains($ARCH) and (endswith("." + $EXT) or contains("-" + $EXT))) | .browser_download_url' \
                | head -n 1)
              
              if [ -z "$URL" ] || [ "$URL" = "null" ]; then
                URL=$(echo "$RESPONSE" | jq -r \
                  --arg PAT "${SEARCH_PATTERN}" --arg ARCH "${ARCH_PATTERN}" \
                  '.assets[] | select(.name | contains($PAT) and contains($ARCH)) | .browser_download_url' \
                  | head -n 1)
              fi
            else
              URL=$(echo "$RESPONSE" | jq -r \
                --arg PAT "${SEARCH_PATTERN}" --arg EXT ".${PKG_EXT}" \
                '.assets[] | select(.name | contains($PAT) and endswith($EXT)) | .browser_download_url' \
                | head -n 1)
              
              if ([ -z "$URL" ] || [ "$URL" = "null" ]) && [ "$PKG_EXT" = "apk" ]; then
                URL=$(echo "$RESPONSE" | jq -r \
                  --arg PAT "${SEARCH_PATTERN}" \
                  '.assets[] | select(.name | contains($PAT) and endswith(".ipk")) | .browser_download_url' \
                  | head -n 1)
              fi
            fi
            
            if [ -n "$URL" ] && [ "$URL" != "null" ]; then
              wget -q "$URL" -P "${CUSTOM_PKG_DIR}" && echo "--> OK: $(basename $URL)"
            else
              echo "::warning::No package found in ${REPO} matching '${SEARCH_PATTERN}' (${ARCH_PATTERN})"
            fi
          }
          
          download_passwall_bundle() {
            local PASSWALL_REPO="$1" PKG_NAME="$2"
            echo "--> Downloading passwall bundle from ${PASSWALL_REPO}..."
            local API_URL="https://api.github.com/repos/${PASSWALL_REPO}/releases/latest"
            local API_RESPONSE=$(curl -sL -H "Authorization: Bearer ${GITHUB_API_TOKEN}" "$API_URL")
            
            if ! echo "${API_RESPONSE}" | jq -e '.assets' > /dev/null 2>&1; then
              echo "::error::Could not fetch release for ${PASSWALL_REPO}"
              return 1
            fi
            
            local ZIP_URL=$(echo "${API_RESPONSE}" | jq -r \
              --arg ARCH "$TARGET_ARCH" --arg EXT "$PKG_EXT" \
              '.assets[] | select(.name | contains("passwall_packages") and contains($ARCH) and endswith(".zip")) | .browser_download_url' \
              | head -n 1)
            
            if [ -n "$ZIP_URL" ] && [ "$ZIP_URL" != "null" ]; then
              wget -q "${ZIP_URL}" -O deps.zip
              unzip -qo deps.zip -d "${CUSTOM_PKG_DIR}"
              rm -f deps.zip
              echo "--> OK: passwall bundle extracted"
            else
              echo "::warning::No zip bundle found for ${PASSWALL_REPO}, trying individual package..."
              download_latest_pkg "${PASSWALL_REPO}" "${PKG_NAME}"
            fi
          }
          
          # Download themes (no arch suffix needed)
          download_latest_pkg "PeDitXOS/luci-theme-peditx" "luci-theme-peditx" ""
          download_latest_pkg "PeDitXOS/luci-theme-carbonPX" "luci-theme-carbonpx" ""
          
          # themeswitch needs arch match (not available for x86/generic)
          if [[ "${{ github.event.inputs.device_target }}" != "x86/generic" ]]; then
            download_latest_pkg "PeDitXOS/luci-app-themeswitch" "luci-app-themeswitch" "${TARGET_ARCH}"
          fi
          
          # Optional extra packages
          EXTRA_PKGS_LOWER=$(echo "${{ github.event.inputs.extra_packages }}" | tr '[:upper:]' '[:lower:]')
          for pkg in $EXTRA_PKGS_LOWER; do
            if [[ "$pkg" == "luci-app-passwall" ]]; then
              download_passwall_bundle "Openwrt-Passwall/openwrt-passwall" "luci-app-passwall"
            fi
            if [[ "$pkg" == "luci-app-passwall2" ]]; then
              download_passwall_bundle "Openwrt-Passwall/openwrt-passwall2" "luci-app-passwall2"
            fi
          done
          
          # Index local APK packages if APK mode
          if [ "${{ env.IS_APK }}" = "true" ]; then
            echo "--> Indexing local APK packages..."
            cd "${CUSTOM_PKG_DIR}"
            if ls *.apk &>/dev/null; then
              /usr/local/bin/apk index --allow-untrusted -o APKINDEX.tar.gz *.apk
              /usr/local/bin/apk index --allow-untrusted -o packages.adb *.apk
              echo "--> APK indexes successfully created."
            else
              echo "::warning::No .apk files found to index."
            fi
            cd -
          fi

      - name: Build Firmware Image
        id: build_image
        run: |
          cd "${{ env.IMAGEBUILDER_DIR }}"
          make clean
          
          THEME_PACKAGES="luci-theme-peditx luci-theme-carbonpx luci-app-themeswitch"
          BASE_PACKAGES="luci luci-ssl luci-compat curl screen sshpass procps-ng-pkill luci-app-ttyd coreutils wget-ssl coreutils-base64 coreutils-nohup"
          
          FINAL_EXTRA_PACKAGES=$(echo "${{ github.event.inputs.extra_packages }}" | tr '[:upper:]' '[:lower:]')
          APPLY_LOW_FLASH_RESTRICTIONS=false
          IS_NON_X86_SBC=false
          
          if [[ "${{ github.event.inputs.device_target }}" == "x86/generic" ]]; then
            echo "::notice::Legacy x86/generic detected — removing themeswitch."
            THEME_PACKAGES="luci-theme-peditx luci-theme-carbonpx"
          fi
          
          case "${{ github.event.inputs.device_profile }}" in
            *archer-a7-v5|*archer-c7-v5|*tl-wdr4300*|*tl-wr1043nd*|*wrt160nl*|*dir-860l-b1*)
              APPLY_LOW_FLASH_RESTRICTIONS=true
              echo "::notice::Limited flash device — applying space restrictions."
              ;;
          esac
          
          case "${{ github.event.inputs.device_profile }}" in
            *nanopi*|*bananapi*|*orangepi*|*rpi*)
              IS_NON_X86_SBC=true
              ;;
          esac
          
          if [[ "$APPLY_LOW_FLASH_RESTRICTIONS" == "true" ]]; then
            THEME_PACKAGES=""
            BASE_PACKAGES=$(echo "$BASE_PACKAGES" | sed 's/screen//g; s/sshpass//g; s/luci-app-ttyd//g')
            
            if [[ " ${FINAL_EXTRA_PACKAGES} " =~ " luci-app-passwall2 " ]]; then
              KEPT_PACKAGES=""
              for pkg in ${FINAL_EXTRA_PACKAGES}; do
                case "$pkg" in
                  luci-app-passwall|luci-app-wol|luci-app-smartdns)
                    ;;
                  *)
                    KEPT_PACKAGES="${KEPT_PACKAGES} ${pkg}"
                    ;;
                esac
              done
              FINAL_EXTRA_PACKAGES=$(echo "${KEPT_PACKAGES}" | xargs)
            fi
          elif [[ "$IS_NON_X86_SBC" == "true" ]]; then
            HEAVY_PKG_COUNT=0
            for pkg in luci-app-passwall luci-app-passwall2 luci-app-wol luci-app-smartdns; do
              if [[ " ${FINAL_EXTRA_PACKAGES} " =~ " ${pkg} " ]]; then
                HEAVY_PKG_COUNT=$((HEAVY_PKG_COUNT + 1))
              fi
            done
            if (( HEAVY_PKG_COUNT > 2 )); then
              echo "::warning::Too many heavy packages — pruning wol and smartdns."
              FINAL_EXTRA_PACKAGES=$(echo "$FINAL_EXTRA_PACKAGES" | sed 's/luci-app-wol//g; s/luci-app-smartdns//g')
            fi
          fi
          
          ALL_PACKAGES="${BASE_PACKAGES} ${THEME_PACKAGES} -luci-theme-bootstrap -dnsmasq dnsmasq-full ${FINAL_EXTRA_PACKAGES} -sing-box -hysteria"
          
          echo "Profile: ${{ github.event.inputs.device_profile }}"
          echo "Final Packages: ${ALL_PACKAGES}"
          
          if [[ "${{ github.event.inputs.device_target }}" == "x86/64" || \
                "${{ github.event.inputs.device_target }}" == "x86/generic" || \
                "$IS_NON_X86_SBC" == "true" ]]; then
            echo "Forcing RootFS to 512MB."
            sed -i '/CONFIG_TARGET_ROOTFS_PARTSIZE/d' .config 2>/dev/null || true
            echo "CONFIG_TARGET_ROOTFS_PARTSIZE=512" >> .config
          fi
          
          make image PROFILE="${{ github.event.inputs.device_profile }}" \
            PACKAGES="${ALL_PACKAGES}" \
            FILES="${{ github.workspace }}/files" \
            BIN_DIR="${{ github.workspace }}/output" V=s

      - name: Upload build logs on failure
        if: failure() && steps.build_image.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: ${{ env.IMAGEBUILDER_DIR }}/logs/

      - name: List Output Directory Contents
        if: always()
        run: |
          ls -R ${{ github.workspace }}/output 2>/dev/null || echo "Output directory empty"

      - name: Organize, Rename, and Compress Files
        id: organize_files
        run: |
          cd "${{ github.workspace }}/output"
          if [ -z "$(ls -A .)" ]; then
            echo "::error::Build failed, no files were generated."
            exit 1
          fi
          
          PRIMARY_IMAGE=""
          for PATTERN in \
            "*sysupgrade.itb*" "*sysupgrade.bin*" "*sysupgrade.img.gz*" "*sysupgrade.img*" \
            "*squashfs-sysupgrade.bin*" "*ext4-sysupgrade.img.gz*" "*nand-sysupgrade.bin*" \
            "*ubi-sysupgrade.img*" "*trx*" "*chk*" "*nand*.tar*" "*ubi*" "*ubifs*" \
            "*ext4*" "*sdcard.img.gz*" "*sdcard.img.xz*" "*factory.bin*" "*factory.img*" \
            "*sdimg*" "*wic*" "*vdi*" "*vmdk*" "*qcow2*" "*vhdx*"; do
            FOUND=$(find . -name "${PATTERN}" | head -n 1)
            if [ -n "$FOUND" ]; then
              PRIMARY_IMAGE="$FOUND"
              break
            fi
          done
          
          if [ -z "$PRIMARY_IMAGE" ]; then
            echo "::error::No primary flashable image found!"
            exit 1
          fi
          
          echo "Primary image: ${PRIMARY_IMAGE}"
          for f in openwrt-*; do mv -- "$f" "PeDitXOS-${f#openwrt-}"; done
          rm -f *.json
          
          TIMESTAMP=$(date +'%Y-%m-%d_%H-%M-%S')
          ARCHIVE_NAME="PeDitXOS-${{ github.event.inputs.device_profile }}-${TIMESTAMP}.zip"
          zip -r "${ARCHIVE_NAME}" .
          echo "ARCHIVE_NAME=${ARCHIVE_NAME}" >> $GITHUB_OUTPUT
          echo "TIMESTAMP=${TIMESTAMP}" >> $GITHUB_OUTPUT

      - name: Upload Firmware to SourceForge
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SF_USERNAME: ${{ secrets.SF_USERNAME }}
          SF_PROJECT_NAME: ${{ secrets.SF_PROJECT_NAME }}
        run: |
          # Security: Ensure key cleanup even on failure
          trap 'rm -f ~/.ssh/id_rsa' EXIT
          
          mkdir -p ~/.ssh
          echo "${SSH_PRIVATE_KEY}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H frs.sourceforge.net >> ~/.ssh/known_hosts 2>/dev/null
          
          REMOTE_BASE_DIR="/home/frs/project/${SF_PROJECT_NAME}/users"
          REMOTE_UPLOAD_DIR="${REMOTE_BASE_DIR}/${{ github.event.inputs.user_id }}/${{ steps.organize_files.outputs.TIMESTAMP }}"
          LOCAL_FILE_PATH="${{ github.workspace }}/output/${{ steps.organize_files.outputs.ARCHIVE_NAME }}"
          
          lftp -c "
          set sftp:connect-program 'ssh -a -x -i ~/.ssh/id_rsa -o StrictHostKeyChecking=yes';
          open -u ${SF_USERNAME}, sftp://frs.sourceforge.net;
          mkdir -p ${REMOTE_UPLOAD_DIR};
          cd ${REMOTE_UPLOAD_DIR};
          put ${LOCAL_FILE_PATH};
          bye;
          "

      - name: Report Result to PeDitXOS Backend
        if: always()
        run: |
          STATUS="failed"
          if [ "${{ job.status }}" == "success" ]; then STATUS="completed"; fi
          DOWNLOAD_URL=""
          if [ "$STATUS" == "completed" ]; then
            DOWNLOAD_URL="http://sourceforge.net/projects/${{ secrets.SF_PROJECT_NAME }}/files/users/${{ github.event.inputs.user_id }}/${{ steps.organize_files.outputs.TIMESTAMP }}/${{ steps.organize_files.outputs.ARCHIVE_NAME }}"
          fi
          
          curl -X POST "http://firmware.peditxos.ir/api/github-status" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_PAT }}" \
            -d "{
              \"build_id\": \"${{ github.event.inputs.build_id }}\",
              \"status\": \"$STATUS\",
              \"download_url\": \"$DOWNLOAD_URL\"
            }"
