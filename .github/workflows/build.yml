name: 'PeDitXOS Firmware Builder'

on:
  workflow_dispatch:
    inputs:
      user_id:
        description: 'Firebase User ID'
        required: true
        type: string
      build_id:
        description: 'Firestore Build ID'
        required: true
        type: string
      device_target:
        description: 'Device Target'
        required: true
        type: string
      device_profile:
        description: 'Device Profile'
        required: true
        type: string
      target_arch:
        description: 'Target Architecture (e.g., x86_64, aarch64_cortex-a53)'
        required: true
        type: string
      openwrt_version:
        description: 'OpenWrt Version'
        required: true
        type: string
      extra_packages:
        description: 'Extra packages'
        required: false
        type: string
      theme_choice:
        description: 'Selected LuCI theme (luci-theme-peditx or luci-theme-carbonpx)'
        required: true
        type: string
      lan_ip:
        description: 'The LAN IP address'
        required: false
        type: string
      wifi_24_enabled:
        description: 'Enable 2.4GHz WiFi'
        required: false
        type: string

jobs:
  build_firmware:
    name: Build Firmware
    runs-on: ubuntu-latest

    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: 'Checkout Repository'
        uses: actions/checkout@v4

      - name: 'Install Build Dependencies'
        run: |
          sudo apt-get update
          sudo apt-get install -y wget tar make coreutils rsync openssh-client curl jq zstd unzip lftp
          
          # Forcefully register the universe repository to guarantee package availability
          sudo add-apt-repository -y universe || true
          
          # Attempt native installation of apk-tools, fallback to dynamic static binary on failure
          sudo apt-get install -y apk-tools || {
            echo "Native apk-tools failed, dynamically resolving official static compiled binary from Alpine..."
            
            # Try resolving from multiple stable Alpine releases (v3.20, v3.21, v3.19) using browser User-Agent
            for version in "v3.20" "v3.21" "v3.19" "edge"; do
              echo "Checking Alpine ${version} repository..."
              HTML=$(curl -sL -A "Mozilla/5.0" "https://dl-cdn.alpinelinux.org/alpine/${version}/main/x86_64/")
              APK_FILENAME=$(echo "$HTML" | grep -oE 'apk-tools-static-[0-9.]+-r[0-9]+\.apk' | head -n 1)
              if [ -n "$APK_FILENAME" ]; then
                APK_URL="https://dl-cdn.alpinelinux.org/alpine/${version}/main/x86_64/${APK_FILENAME}"
                echo "Found static APK package: ${APK_FILENAME}"
                break
              fi
            done
            
            if [ -z "$APK_URL" ]; then
              echo "::error::Could not dynamically resolve apk-tools-static filename from Alpine mirrors."
              exit 1
            fi
            
            echo "Downloading static apk-tools from: $APK_URL"
            wget -qO /tmp/apk-static.apk "$APK_URL"
            
            # Extract safely using tar -xf (which handles both gzip and zstd automatically)
            tar -xf /tmp/apk-static.apk -C /tmp sbin/apk.static
            sudo mv /tmp/sbin/apk.static /usr/bin/apk
            sudo chmod +x /usr/bin/apk
            rm -f /tmp/apk-static.apk
          }
          
          # Validate package management tool binary registration
          apk --version || echo "Warning: local apk tool configuration finished with warnings"

      - name: 'Download and Extract OpenWrt ImageBuilder'
        id: download_ib
        run: |
          TARGET_DIR_URL="https://downloads.openwrt.org/releases/${{ github.event.inputs.openwrt_version }}/targets/${{ github.event.inputs.device_target }}"
          IMAGEBUILDER_FILENAME=$(curl -s "${TARGET_DIR_URL}/" | grep -o 'href="[^"]*imagebuilder[^"]*\.tar\.\(xz\|zst\)"' | head -n 1 | sed 's/href="//;s/"//')
          if [ -z "$IMAGEBUILDER_FILENAME" ]; then
            echo "::error::Could not automatically find the ImageBuilder filename."
            exit 1
          fi
          echo "IMAGEBUILDER_FILENAME=${IMAGEBUILDER_FILENAME}" >> $GITHUB_OUTPUT
          IMAGEBUILDER_URL="${TARGET_DIR_URL}/${IMAGEBUILDER_FILENAME}"
          wget "${IMAGEBUILDER_URL}"
          mkdir imagebuilder
          tar -xf "${IMAGEBUILDER_FILENAME}" --strip-components=1 -C imagebuilder

      - name: 'Prepare ImageBuilder Environment'
        run: |
          IMAGEBUILDER_DIR="imagebuilder"
          echo "IMAGEBUILDER_DIR=${IMAGEBUILDER_DIR}" >> $GITHUB_ENV
          TARGET_ARCH="${{ github.event.inputs.target_arch }}"
          echo "TARGET_ARCH=${TARGET_ARCH}" >> $GITHUB_ENV
          
          # Proxy all potential internal ImageBuilder source files to our custom repository server with correct path prefix (/openwrt)
          find "${IMAGEBUILDER_DIR}" -type f \( -name "repositories.conf" -o -name "repositories" -o -name "apk.conf" \) 2>/dev/null | while read -r file; do
            echo "Adjusting sources in: $file"
            sed -i 's|https://downloads.openwrt.org|http://repository.peditxos.ir/openwrt|g' "$file"
            sed -i 's|http://downloads.openwrt.org|http://repository.peditxos.ir/openwrt|g' "$file"
            sed -i 's/^option check_signature.*/option check_signature 0/' "$file"
          done

          # Download and register the public custom key to all trusted key locations within ImageBuilder (Using fallback '|| echo' to bypass 404/server crashes)
          wget -qO /tmp/passwall.pub http://repository.peditxos.ir/openwrt-passwall-build/passwall.pub || echo "Warning: Custom key download failed"
          if [ -f /tmp/passwall.pub ]; then
            find "${IMAGEBUILDER_DIR}" -type d -name "keys" 2>/dev/null | while read -r dir; do
              echo "Adding custom signature key to: $dir"
              cp /tmp/passwall.pub "$dir/passwall.rsa.pub"
              cp /tmp/passwall.pub "$dir/passwall.pub"
            done
            # Keep host local build environment trusted as well
            mkdir -p "${IMAGEBUILDER_DIR}/etc/apk/keys"
            cp /tmp/passwall.pub "${IMAGEBUILDER_DIR}/etc/apk/keys/passwall.rsa.pub"
          fi
          
          echo "--- Signature check configurations and proxies initialized ---"

      - name: 'Prepare Custom Files and Scripts'
        run: |
          FILES_DIR="${{ github.workspace }}/files"
          mkdir -p "${FILES_DIR}/etc"
          
          IMAGEBUILDER_DIR="${{ github.workspace }}/imagebuilder"
          
          # Dynamically detect package manager directly from the extracted ImageBuilder configurations
          if [ -f "${IMAGEBUILDER_DIR}/apk.conf" ] || [ -d "${IMAGEBUILDER_DIR}/etc/apk" ] || grep -q -E "apk|APK" "${IMAGEBUILDER_DIR}/Makefile" 2>/dev/null; then
            IS_APK=true
            PKG_EXT="apk"
            echo "::notice::Detected APK package manager inside ImageBuilder"
          else
            IS_APK=false
            PKG_EXT="ipk"
            echo "::notice::Detected OPKG package manager inside ImageBuilder"
          fi
          
          echo "IS_APK=${IS_APK}" >> $GITHUB_ENV
          echo "PKG_EXT=${PKG_EXT}" >> $GITHUB_ENV
          
          OPENWRT_RELEASE_BASE=$(echo "${{ github.event.inputs.openwrt_version }}" | cut -d. -f1-2)
          TARGET_ARCH_VAR="${{ github.event.inputs.target_arch }}"
          
          # --- Create Custom Repositories / Feeds ---
          if [ "$IS_APK" = "true" ]; then
            # Generate APK repository feeds configuration using '%a' to prevent duplicate architecture path appending by the APK manager
            CUSTOM_REPOS_DIR="${FILES_DIR}/etc/apk"
            mkdir -p "${CUSTOM_REPOS_DIR}"
            CUSTOM_REPOS_FILE="${CUSTOM_REPOS_DIR}/repositories"
            BASE_URL="http://repository.peditxos.ir/openwrt-passwall-build/releases/packages-${OPENWRT_RELEASE_BASE}/%a"
            
            echo "http://repository.peditxos.ir/openwrt/releases/${{ github.event.inputs.openwrt_version }}/packages/%a/base" > "${CUSTOM_REPOS_FILE}"
            echo "http://repository.peditxos.ir/openwrt/releases/${{ github.event.inputs.openwrt_version }}/packages/%a/luci" >> "${CUSTOM_REPOS_FILE}"
            echo "http://repository.peditxos.ir/openwrt/releases/${{ github.event.inputs.openwrt_version }}/packages/%a/packages" >> "${CUSTOM_REPOS_FILE}"
            echo "http://repository.peditxos.ir/openwrt/releases/${{ github.event.inputs.openwrt_version }}/packages/%a/routing" >> "${CUSTOM_REPOS_FILE}"
            echo "http://repository.peditxos.ir/openwrt/releases/${{ github.event.inputs.openwrt_version }}/packages/%a/telephony" >> "${CUSTOM_REPOS_FILE}"
            echo "$BASE_URL/passwall_luci" >> "${CUSTOM_REPOS_FILE}"
            echo "$BASE_URL/passwall_packages" >> "${CUSTOM_REPOS_FILE}"
            echo "$BASE_URL/passwall2" >> "${CUSTOM_REPOS_FILE}"
            echo "--- APK repositories config generated ---"
          else
            # Generate legacy OPKG customfeeds configuration
            CUSTOM_FEEDS_DIR="${FILES_DIR}/etc/opkg"
            mkdir -p "${CUSTOM_FEEDS_DIR}"
            CUSTOM_FEEDS_FILE="${CUSTOM_FEEDS_DIR}/customfeeds.conf"
            BASE_URL="http://repository.peditxos.ir/openwrt-passwall-build/releases/packages-${OPENWRT_RELEASE_BASE}/${TARGET_ARCH_VAR}"
            
            echo "# PeDitXOS Custom Feeds" > "${CUSTOM_FEEDS_FILE}"
            echo "src/gz peditxos_passwall_luci $BASE_URL/passwall_luci" >> "${CUSTOM_FEEDS_FILE}"
            echo "src/gz peditxos_passwall_pkgs $BASE_URL/passwall_packages" >> "${CUSTOM_FEEDS_FILE}"
            echo "src/gz peditxos_passwall2 $BASE_URL/passwall2" >> "${CUSTOM_FEEDS_FILE}"
            echo "--- Custom OPKG feeds generated ---"
          fi

          # --- Branding Strategy ---
          cat << EOF > "${FILES_DIR}/etc/os-release"
          NAME='PeDitXOS'
          VERSION='${{ github.event.inputs.openwrt_version }}'
          ID='peditxos'
          ID_LIKE='openwrt'
          PRETTY_NAME='PeDitXOS (${{ github.event.inputs.openwrt_version }})'
          VERSION_ID='${{ github.event.inputs.openwrt_version }}'
          HOME_URL='https://sourceforge.net/projects/peditxos/'
          SUPPORT_URL='https://t.me/peditx'
          BUG_REPORT_URL='https://t.me/peditx'
          OPENWRT_BOARD='${{ github.event.inputs.device_target }}'
          OPENWRT_ARCH='${{ github.event.inputs.target_arch }}'
          OPENWRT_TAINTS='no-all'
          OPENWRT_RELEASE='PeDitXOS (${{ github.event.inputs.openwrt_version }})'
          EOF
          echo "--- os-release file generated ---"

          # --- Create UCI Defaults Script with engine-adaptive fallback logic ---
          UCI_SCRIPT_DIR="${FILES_DIR}/etc/uci-defaults"
          mkdir -p "${UCI_SCRIPT_DIR}"
          UCI_SCRIPT_PATH="${UCI_SCRIPT_DIR}/99-peditxos-settings"
          
          echo "#!/bin/sh" > "${UCI_SCRIPT_PATH}"
          
          cat << 'EOF_SCRIPT' >> "${UCI_SCRIPT_PATH}"
          # 1. Handle Legacy OPKG environment if detected
          if [ -d /etc/opkg ]; then
            if [ -f /etc/opkg.conf ]; then
              sed -i 's/option check_signature/# option check_signature/g' /etc/opkg.conf
            fi
            if [ -f /etc/opkg/distfeeds.conf ]; then
              sed -i 's|https://downloads.openwrt.org|http://repository.peditxos.ir/openwrt|g' /etc/opkg/distfeeds.conf
              sed -i 's|http://downloads.openwrt.org|http://repository.peditxos.ir/openwrt|g' /etc/opkg/distfeeds.conf
            fi
            wget -qO /tmp/passwall.pub http://repository.peditxos.ir/openwrt-passwall-build/passwall.pub || echo "Failed to download custom OPKG public key"
            opkg-key add /tmp/passwall.pub > /dev/null 2>&1 || echo "Failed to register custom OPKG key"
            rm -f /tmp/passwall.pub
          fi

          # 2. Handle Modern APK (OpenWrt 25+) environment if detected
          if [ -d /etc/apk ]; then
            if [ -f /etc/apk/repositories ]; then
              sed -i 's|https://downloads.openwrt.org|http://repository.peditxos.ir/openwrt|g' /etc/apk/repositories
              sed -i 's|http://downloads.openwrt.org|http://repository.peditxos.ir/openwrt|g' /etc/apk/repositories
              
              # Safely append dynamic APK repositories fallback if needed
              if ! grep -q "openwrt-passwall-build" /etc/apk/repositories 2>/dev/null; then
                if [ -f /etc/openwrt_release ]; then
                  . /etc/openwrt_release
                  V_MAJOR=$(echo "$DISTRIB_RELEASE" | cut -d. -f1-2)
                  V_ARCH="$DISTRIB_ARCH"
                fi
                if [ -n "$V_MAJOR" ] && [ -n "$V_ARCH" ]; then
                  echo "http://repository.peditxos.ir/openwrt-passwall-build/releases/packages-${V_MAJOR}/${V_ARCH}/passwall_packages" >> /etc/apk/repositories
                  echo "http://repository.peditxos.ir/openwrt-passwall-build/releases/packages-${V_MAJOR}/${V_ARCH}/passwall_luci" >> /etc/apk/repositories
                  echo "http://repository.peditxos.ir/openwrt-passwall-build/releases/packages-${V_MAJOR}/${V_ARCH}/passwall2" >> /etc/apk/repositories
                fi
              fi
            fi
            # Place signature keys properly into APK database with wget fallback
            mkdir -p /etc/apk/keys
            wget -qO /etc/apk/keys/passwall.rsa.pub http://repository.peditxos.ir/openwrt-passwall-build/passwall.pub > /dev/null 2>&1 || echo "Failed to download custom APK public key"
          fi
          EOF_SCRIPT

          # UCI settings
          THEME_NAME=$(echo "${{ github.event.inputs.theme_choice }}" | sed 's/luci-theme-//')
          echo "uci -q batch <<EOF" >> "${UCI_SCRIPT_PATH}"
          echo "set system.@system[0].hostname='PeDitXOS'" >> "${UCI_SCRIPT_PATH}"
          echo "set system.@system[0].description='PeDitXOS (Built for ${{ github.event.inputs.device_profile }})'" >> "${UCI_SCRIPT_PATH}"
          echo "set system.@system[0].timezone='Asia/Tehran'" >> "${UCI_SCRIPT_PATH}"
          echo "set system.@system[0].zonename='IRT+3:30'" >> "${UCI_SCRIPT_PATH}"
          echo "set system.@system[0].ntpserver='ir.pool.ntp.org time.cloudflare.com'" >> "${UCI_SCRIPT_PATH}"
          echo "set network.wan.dns='8.8.8.8 8.8.4.4'" >> "${UCI_SCRIPT_PATH}"
          echo "set luci.main.mediaurlbase='/luci-static/${THEME_NAME}'" >> "${UCI_SCRIPT_PATH}"

          if [ -n "${{ github.event.inputs.lan_ip }}" ]; then
            echo "set network.lan.ipaddr='${{ github.event.inputs.lan_ip }}'" >> "${UCI_SCRIPT_PATH}"
            echo "set dhcp.lan.start='100'" >> "${UCI_SCRIPT_PATH}"
            echo "set dhcp.lan.limit='150'" >> "${UCI_SCRIPT_PATH}"
            echo "set dhcp.lan.interface='lan'" >> "${UCI_SCRIPT_PATH}"
          fi
          
          if [ "${{ github.event.inputs.wifi_24_enabled }}" = "false" ]; then
            echo "set wireless.radio0.disabled='1'" >> "${UCI_SCRIPT_PATH}"
          else
            echo "set wireless.radio0.disabled='0'" >> "${UCI_SCRIPT_PATH}"
          fi

          echo "commit" >> "${UCI_SCRIPT_PATH}"
          echo "EOF" >> "${UCI_SCRIPT_PATH}"
          echo "rm -rf /tmp/luci-cache/*" >> "${UCI_SCRIPT_PATH}"
          echo "service uhttpd restart" >> "${UCI_SCRIPT_PATH}"
          echo "/sbin/reload_config" >> "${UCI_SCRIPT_PATH}"
          
          chmod +x "${UCI_SCRIPT_PATH}"
          echo "--- Custom UCI script generated ---"

      - name: 'Download Custom Packages'
        env:
          GITHUB_API_TOKEN: ${{ github.token }}
        run: |
          CUSTOM_PKG_DIR="${{ env.IMAGEBUILDER_DIR }}/packages"
          mkdir -p "${CUSTOM_PKG_DIR}"
          
          # Universal downloader using /releases/latest with APK->IPK fallback from individual repos
          download_latest_pkg() {
            local REPO="$1"
            local SEARCH_PATTERN="$2"
            local ARCH_PATTERN="$3"
            
            echo "--> Fetching latest from ${REPO} matching '${SEARCH_PATTERN}'..."
            local API_URL="https://api.github.com/repos/${REPO}/releases/latest"
            local RESPONSE=$(curl -sL -H "Authorization: Bearer ${GITHUB_API_TOKEN}" "$API_URL")
            
            if ! echo "$RESPONSE" | jq -e '.assets' > /dev/null 2>&1; then
              echo "::error::Invalid API response or no releases found for ${REPO}"
              return 1
            fi
            
            local URL=""
            if [ -n "$ARCH_PATTERN" ]; then
              # Match name containing both SEARCH_PATTERN and ARCH_PATTERN, and also matching the package type (apk/ipk)
              URL=$(echo "$RESPONSE" | jq -r --arg PAT "${SEARCH_PATTERN}" --arg ARCH "${ARCH_PATTERN}" --arg EXT "$PKG_EXT" \
                '.assets[] | select(.name | contains($PAT) and contains($ARCH) and (contains("-" + $EXT) or endswith("." + $EXT))) | .browser_download_url' | head -n 1)
              
              # Fallback if no specific extension/type match is found
              if [ -z "$URL" ] || [ "$URL" == "null" ]; then
                echo "::warning::Strict package type match failed, trying general match..."
                URL=$(echo "$RESPONSE" | jq -r --arg PAT "${SEARCH_PATTERN}" --arg ARCH "${ARCH_PATTERN}" \
                  '.assets[] | select(.name | contains($PAT) and contains($ARCH)) | .browser_download_url' | head -n 1)
              fi
            else
              # Architecture independent matching (like themes)
              URL=$(echo "$RESPONSE" | jq -r --arg PAT "${SEARCH_PATTERN}" --arg EXT ".${PKG_EXT}" \
                '.assets[] | select(.name | contains($PAT) and endswith($EXT)) | .browser_download_url' | head -n 1)
              
              # Fallback to .ipk if .apk is not found for architecture-independent packages
              if [ -z "$URL" ] || [ "$URL" == "null" ]; then
                if [ "$PKG_EXT" = "apk" ]; then
                  echo "::warning::No .apk found for ${SEARCH_PATTERN}, falling back to .ipk..."
                  URL=$(echo "$RESPONSE" | jq -r --arg PAT "${SEARCH_PATTERN}" \
                    '.assets[] | select(.name | contains($PAT) and endswith(".ipk")) | .browser_download_url' | head -n 1)
                fi
              fi
            fi
              
            if [ -n "$URL" ] && [ "$URL" != "null" ]; then
              wget -q "$URL" -P "${CUSTOM_PKG_DIR}" && echo "--> OK: $(basename $URL)"
            else
              echo "::error::No matching package found for ${SEARCH_PATTERN} (Arch: ${ARCH_PATTERN}) in latest release of ${REPO}"
              return 1
            fi
          }

          # Download Themes (Architecture Independent) from their new individual repositories
          download_latest_pkg "PeDitXOS/luci-theme-peditx" "luci-theme-peditx"
          download_latest_pkg "PeDitXOS/luci-theme-carbonPX" "luci-theme-carbonpx"

          # Download ThemeSwitch (Architecture Specific) from its new individual repository
          if [[ "${{ github.event.inputs.device_target }}" != "x86/generic" ]]; then
            download_latest_pkg "PeDitXOS/luci-app-themeswitch" "luci-app-themeswitch" "$TARGET_ARCH"
          fi
          
          # Download Passwall & Passwall2 bundles from OFFICIAL repositories
          download_passwall_bundle() {
            local PASSWALL_REPO_PATH="$1"
            local PKG_NAME="$2"
            echo "--> Attempting to download dependency bundle for ${PASSWALL_REPO_PATH}..."
            local API_URL="https://api.github.com/repos/${PASSWALL_REPO_PATH}/releases/latest"
            local API_RESPONSE=$(curl -sL -H "Authorization: Bearer ${GITHUB_API_TOKEN}" "$API_URL")
            
            if echo "${API_RESPONSE}" | jq -e '.assets' > /dev/null 2>&1; then
              # Try to find architecture-specific zip bundle first
              local ZIP_URL=$(echo "${API_RESPONSE}" | jq -r --arg ARCH "$TARGET_ARCH" --arg EXT "$PKG_EXT" \
                '.assets[] | select(.name | contains("passwall_packages") and contains($EXT) and contains($ARCH) and endswith("zip")) | .browser_download_url' | head -n 1)
              
              # Fallback to generic zip if arch-specific not found
              if [ -z "$ZIP_URL" ] || [ "$ZIP_URL" = "null" ]; then
                ZIP_URL=$(echo "${API_RESPONSE}" | jq -r --arg ARCH "$TARGET_ARCH" \
                  '.assets[] | select(.name | contains("passwall_packages") and contains($ARCH) and endswith("zip")) | .browser_download_url' | head -n 1)
              fi
              
              if [ -n "$ZIP_URL" ] && [ "$ZIP_URL" != "null" ]; then
                wget -q "${ZIP_URL}" -O deps.zip || echo "Warning: Failed downloading passwall zip bundle"
                unzip -qo deps.zip -d "${CUSTOM_PKG_DIR}" || echo "Warning: Extraction failed"
                rm -f deps.zip
                echo "--> Successfully downloaded dependency bundle for ${PASSWALL_REPO_PATH}"
              else
                echo "::warning::Could not find dependency bundle for ${PASSWALL_REPO_PATH}. Trying individual package..."
                # Fallback to individual ipk/apk
                local PKG_URL=$(echo "${API_RESPONSE}" | jq -r --arg NAME "$PKG_NAME" --arg EXT ".${PKG_EXT}" \
                  '.assets[] | select(.name | contains($NAME) and endswith($EXT)) | .browser_download_url' | head -n 1)
                
                if [ -z "$PKG_URL" ] || [ "$PKG_URL" = "null" ]; then
                  if [ "$PKG_EXT" = "apk" ]; then
                    PKG_URL=$(echo "${API_RESPONSE}" | jq -r --arg NAME "$PKG_NAME" \
                      '.assets[] | select(.name | contains($NAME) and endswith(".ipk")) | .browser_download_url' | head -n 1)
                  fi
                fi
                
                if [ -n "$PKG_URL" ] && [ "$PKG_URL" != "null" ]; then
                  wget -q "$PKG_URL" -P "${CUSTOM_PKG_DIR}" && echo "--> OK: Individual package downloaded"
                else
                  echo "::warning::No individual package found for ${PKG_NAME} either."
                fi
              fi
            else
              echo "::warning::Could not find a valid release for ${PASSWALL_REPO_PATH}."
            fi
          }

          EXTRA_PKGS_LOWER=$(echo "${{ github.event.inputs.extra_packages }}" | tr '[:upper:]' '[:lower:]')
          for pkg in $EXTRA_PKGS_LOWER; do
            if [[ "$pkg" == "luci-app-passwall" ]]; then
              download_passwall_bundle "Openwrt-Passwall/openwrt-passwall" "luci-app-passwall"
            fi
            if [[ "$pkg" == "luci-app-passwall2" ]]; then
              download_passwall_bundle "Openwrt-Passwall/openwrt-passwall2" "luci-app-passwall2"
            fi
          done

          # CRITICAL FIX: Dynamically find and use OpenWrt's native host apk tool with --allow-untrusted flag
          if [ "$IS_APK" = "true" ]; then
            echo "--> Scanning ImageBuilder for native host apk binary..."
            cd "${CUSTOM_PKG_DIR}"
            
            OWRT_APK=""
            # Loop through all files named 'apk' with execute permissions inside ImageBuilder
            for f in $(find "${{ github.workspace }}/imagebuilder" -type f -name "apk" -executable); do
              # Test if the executable runs successfully on our runner to filter out target-arch binaries
              if "$f" --version >/dev/null 2>&1; then
                OWRT_APK="$f"
                echo "--> Found valid host apk binary: $OWRT_APK"
                break
              fi
            done
            
            if [ -n "$OWRT_APK" ] && [ -x "$OWRT_APK" ]; then
              if ls *.apk &>/dev/null; then
                echo "--> Indexing $(ls *.apk | wc -l) packages into APKINDEX.tar.gz and packages.adb (with trust flag)..."
                # Added --allow-untrusted flag to safely index all custom packages bypass host verification errors
                "$OWRT_APK" index --allow-untrusted -o APKINDEX.tar.gz *.apk
                "$OWRT_APK" index --allow-untrusted -o packages.adb *.apk
              fi
            else
              echo "::error::Could not find a valid runnable native host apk binary inside the ImageBuilder directory."
              exit 1
            fi
            
            if [ -f "packages.adb" ] && [ -s "packages.adb" ]; then
              echo "--> APK index successfully created ($(stat -c%s packages.adb) bytes)"
            else
              echo "::error::Failed to generate a valid non-empty packages.adb SQLite database"
              exit 1
            fi
            cd -
          fi
    
      - name: 'Build Firmware Image'
        id: build_image
        run: |
          cd "${{ env.IMAGEBUILDER_DIR }}"
          
          # --- Smart Package Selection Logic ---
          THEME_PACKAGES="luci-theme-peditx luci-theme-carbonpx luci-app-themeswitch"
          BASE_PACKAGES="luci luci-ssl luci-compat curl screen sshpass procps-ng-pkill luci-app-ttyd coreutils wget-ssl coreutils-base64 coreutils-nohup"
          
          # Convert all input packages to lowercase
          FINAL_EXTRA_PACKAGES=$(echo "${{ github.event.inputs.extra_packages }}" | tr '[:upper:]' '[:lower:]')

          APPLY_LOW_FLASH_RESTRICTIONS=false
          if [[ "${{ github.event.inputs.device_target }}" == "x86/generic" ]]; then
            echo "::notice::Legacy x86 target detected. Removing themeswitch."
            THEME_PACKAGES="luci-theme-peditx luci-theme-carbonpx"
          fi

          case "${{ github.event.inputs.device_profile }}" in
            *archer-a7-v5|*archer-c7-v5|*tl-wdr4300*|*tl-wr1043nd*|*wrt160nl*|*dir-860l-b1*)
              APPLY_LOW_FLASH_RESTRICTIONS=true
              echo "::notice::Device with limited flash detected. Applying restrictions."
              ;;
          esac

          IS_NON_X86_SBC=false
          case "${{ github.event.inputs.device_profile }}" in
            *nanopi*|*bananapi*|*orangepi*|*rpi*)
              IS_NON_X86_SBC=true
              ;;
          esac

          if [[ "$APPLY_LOW_FLASH_RESTRICTIONS" == "true" ]]; then
            THEME_PACKAGES=""
            echo "::notice::Removing non-essential base packages to free up space."
            BASE_PACKAGES=$(echo "$BASE_PACKAGES" | sed 's/screen//g; s/sshpass//g; s/luci-app-ttyd//g')
            
            if [[ " ${FINAL_EXTRA_PACKAGES} " =~ " luci-app-passwall2 " ]]; then
              echo "::notice::Prioritizing luci-app-passwall2. Removing other heavy packages."
              KEPT_PACKAGES=""
              for pkg in ${FINAL_EXTRA_PACKAGES}; do
                case "$pkg" in
                  luci-app-passwall|luci-app-wol|luci-app-smartdns)
                    ;;
                  *)
                    KEPT_PACKAGES="${KEPT_PACKAGES} ${pkg}"
                    ;;
                esac
              done
              FINAL_EXTRA_PACKAGES=$(echo "${KEPT_PACKAGES}" | xargs)
            fi

          elif [[ "$IS_NON_X86_SBC" == "true" ]]; then
            HEAVY_PKG_COUNT=0
            for pkg in luci-app-passwall luci-app-passwall2 luci-app-wol luci-app-smartdns; do
              if [[ " ${FINAL_EXTRA_PACKAGES} " =~ " ${pkg} " ]]; then
                HEAVY_PKG_COUNT=$((HEAVY_PKG_COUNT + 1))
              fi
            done
            
            if (( HEAVY_PKG_COUNT > 2 )); then
              echo "::warning::More than 2 heavy packages selected. Pruning luci-app-wol/smartdns."
              FINAL_EXTRA_PACKAGES=$(echo "$FINAL_EXTRA_PACKAGES" | sed 's/luci-app-wol//g; s/luci-app-smartdns//g')
            fi
          fi
          
          # Assemble the final list of all packages
          # Explicitly exclude sing-box and hysteria to prevent them from slipping in and taking up space
          ALL_PACKAGES="${BASE_PACKAGES} ${THEME_PACKAGES} -luci-theme-bootstrap -dnsmasq dnsmasq-full ${FINAL_EXTRA_PACKAGES} -sing-box -hysteria"
          
          echo "Building with Profile: ${{ github.event.inputs.device_profile }}"
          echo "Final Packages: ${ALL_PACKAGES}"
          
          if [[ "${{ github.event.inputs.device_target }}" == "x86/64" || "${{ github.event.inputs.device_target }}" == "x86/generic" || "$IS_NON_X86_SBC" == "true" ]]; then
            echo "x86 or SBC target. Forcing RootFS to 512MB."
            sed -i '/CONFIG_TARGET_ROOTFS_PARTSIZE/d' .config
            echo "CONFIG_TARGET_ROOTFS_PARTSIZE=512" >> .config
          else
            echo "Using default RootFS size for the profile."
          fi
          
          make image PROFILE="${{ github.event.inputs.device_profile }}" \
            PACKAGES="${ALL_PACKAGES}" \
            FILES="${{ github.workspace }}/files" \
            BIN_DIR="${{ github.workspace }}/output" V=s

      - name: 'Upload build logs on failure'
        if: failure() && steps.build_image.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: ${{ env.IMAGEBUILDER_DIR }}/logs/

      - name: 'List Output Directory Contents'
        if: always()
        run: |
          echo "--- Listing contents of output directory ---"
          ls -R ${{ github.workspace }}/output 2>/dev/null || echo "Output directory not created yet due to build stage interruption"

      - name: 'Organize, Rename, and Compress Files'
        id: organize_files
        run: |
          cd "${{ github.workspace }}/output"
          if [ -z "$(ls -A .)" ]; then 
            echo "::error::Build failed, no files were generated."
            exit 1
          fi
          
          PRIMARY_IMAGE=""
          if [[ -n $(find . -name "*sysupgrade.itb*" | head -n 1) ]]; then
            PRIMARY_IMAGE=$(find . -name "*sysupgrade.itb*" | head -n 1)
          elif [[ -n $(find . -name "*sysupgrade.bin*" | head -n 1) ]]; then
            PRIMARY_IMAGE=$(find . -name "*sysupgrade.bin*" | head -n 1)
          elif [[ -n $(find . -name "*sysupgrade.img*" | head -n 1) ]]; then
            PRIMARY_IMAGE=$(find . -name "*sysupgrade.img*" | head -n 1)
          elif [[ -n $(find . -name "*sysupgrade.img.gz*" | head -n 1) ]]; then
            PRIMARY_IMAGE=$(find . -name "*sysupgrade.img.gz*" | head -n 1)
          elif [[ -n $(find . -name "*squashfs-sysupgrade.bin*" | head -n 1) ]]; then
            PRIMARY_IMAGE=$(find . -name "*squashfs-sysupgrade.bin*" | head -n 1)
          elif [[ -n $(find . -name "*ext4-sysupgrade.img.gz*" | head -n 1) ]]; then
            PRIMARY_IMAGE=$(find . -name "*ext4-sysupgrade.img.gz*" | head -n 1)
          elif [[ -n $(find . -name "*nand-sysupgrade.bin*" | head -n 1) ]]; then
            PRIMARY_IMAGE=$(find . -name "*nand-sysupgrade.bin*" | head -n 1)
          elif [[ -n $(find . -name "*ubi-sysupgrade.img*" | head -n 1) ]]; then
            PRIMARY_IMAGE=$(find . -name "*ubi-sysupgrade.img*" | head -n 1)
          elif [[ -n $(find . -name "*trx*" | head -n 1) ]]; then
            PRIMARY_IMAGE=$(find . -name "*trx*" | head -n 1)
          elif [[ -n $(find . -name "*chk*" | head -n 1) ]]; then
            PRIMARY_IMAGE=$(find . -name "*chk*" | head -n 1)
          elif [[ -n $(find . -name "*tar*" | head -n 1) ]]; then
            PRIMARY_IMAGE=$(find . -name "*tar*" | head -n 1)
          elif [[ -n $(find . -name "*ubi*" | head -n 1) ]]; then
            PRIMARY_IMAGE=$(find . -name "*ubi*" | head -n 1)
          elif [[ -n $(find . -name "*ubifs*" | head -n 1) ]]; then
            PRIMARY_IMAGE=$(find . -name "*ubifs*" | head -n 1)
          elif [[ -n $(find . -name "*ext4*" | head -n 1) ]]; then
            PRIMARY_IMAGE=$(find . -name "*ext4*" | head -n 1)
          elif [[ -n $(find . -name "*sdcard.img.gz*" | head -n 1) ]]; then
            PRIMARY_IMAGE=$(find . -name "*sdcard.img.gz*" | head -n 1)
          elif [[ -n $(find . -name "*sdcard.img.xz*" | head -n 1) ]]; then
            PRIMARY_IMAGE=$(find . -name "*sdcard.img.xz*" | head -n 1)
          elif [[ -n $(find . -name "*factory.bin*" | head -n 1) ]]; then
            PRIMARY_IMAGE=$(find . -name "*factory.bin*" | head -n 1)
          elif [[ -n $(find . -name "*factory.img*" | head -n 1) ]]; then
            PRIMARY_IMAGE=$(find . -name "*factory.img*" | head -n 1)
          elif [[ -n $(find . -name "*sdimg*" | head -n 1) ]]; then
            PRIMARY_IMAGE=$(find . -name "*sdimg*" | head -n 1)
          elif [[ -n $(find . -name "*wic*" | head -n 1) ]]; then
            PRIMARY_IMAGE=$(find . -name "*wic*" | head -n 1)
          elif [[ -n $(find . -name "*vdi*" | head -n 1) ]]; then
            PRIMARY_IMAGE=$(find . -name "*vdi*" | head -n 1)
          elif [[ -n $(find . -name "*vmdk*" | head -n 1) ]]; then
            PRIMARY_IMAGE=$(find . -name "*vmdk*" | head -n 1)
          elif [[ -n $(find . -name "*qcow2*" | head -n 1) ]]; then
            PRIMARY_IMAGE=$(find . -name "*qcow2*" | head -n 1)
          elif [[ -n $(find . -name "*vhdx*" | head -n 1) ]]; then
            PRIMARY_IMAGE=$(find . -name "*vhdx*" | head -n 1)
          fi

          if [ -z "$PRIMARY_IMAGE" ]; then
            echo "::error::No primary flashable image found!"
            exit 1
          fi
          echo "Primary image found: ${PRIMARY_IMAGE}"
          for f in openwrt-*; do mv -- "$f" "PeDitXOS-${f#openwrt-}"; done
          rm -f *.json

          TIMESTAMP=$(date +'%Y-%m-%d_%H-%M-%S')
          ARCHIVE_NAME="PeDitXOS-${{ github.event.inputs.device_profile }}-${TIMESTAMP}.zip"
          zip -r "${ARCHIVE_NAME}" .
          echo "ARCHIVE_NAME=${ARCHIVE_NAME}" >> $GITHUB_OUTPUT
          echo "TIMESTAMP=${TIMESTAMP}" >> $GITHUB_OUTPUT

      - name: 'Upload Firmware to SourceForge'
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SF_USERNAME: ${{ secrets.SF_USERNAME }}
          SF_PROJECT_NAME: ${{ secrets.SF_PROJECT_NAME }}
        run: |
          mkdir -p ~/.ssh
          echo "${SSH_PRIVATE_KEY}" > ~/.rsa
          echo "${SSH_PRIVATE_KEY}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H frs.sourceforge.net >> ~/.ssh/known_hosts
          
          REMOTE_BASE_DIR="/home/frs/project/${SF_PROJECT_NAME}/users"
          REMOTE_UPLOAD_DIR="${REMOTE_BASE_DIR}/${{ github.event.inputs.user_id }}/${{ steps.organize_files.outputs.TIMESTAMP }}"
          LOCAL_FILE_PATH="${{ github.workspace }}/output/${{ steps.organize_files.outputs.ARCHIVE_NAME }}"

          echo "Connecting to sftp://frs.sourceforge.net as user ${SF_USERNAME}"
          echo "Remote directory to create: ${REMOTE_UPLOAD_DIR}"
          echo "Local file to upload: ${LOCAL_FILE_PATH}"
          
          lftp -c "
          set sftp:connect-program 'ssh -a -x -i ~/.ssh/id_rsa -o StrictHostKeyChecking=yes';
          open -u ${SF_USERNAME}, sftp://frs.sourceforge.net;
          mkdir -p ${REMOTE_UPLOAD_DIR};
          cd ${REMOTE_UPLOAD_DIR};
          put ${LOCAL_FILE_PATH};
          bye;
          "
          rm -f ~/.ssh/id_rsa
          echo "Upload complete."

      - name: 'Report Result to PeDitXOS Backend'
        if: always()
        run: |
          STATUS="failed"
          if [ "${{ job.status }}" == "success" ]; then STATUS="completed"; fi
          DOWNLOAD_URL=""
          if [ "$STATUS" == "completed" ]; then
            DOWNLOAD_URL="https://sourceforge.net/projects/${{ secrets.SF_PROJECT_NAME }}/files/users/${{ github.event.inputs.user_id }}/${{ steps.organize_files.outputs.TIMESTAMP }}/${{ steps.organize_files.outputs.ARCHIVE_NAME }}"
          fi
          
          # Clean payload mapping avoiding trailing character mutations on PostgreSQL instances
          curl -X POST "https://firmware.peditxos.ir/api/github-status" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_PAT }}" \
            -d "{
              \"build_id\": \"${{ github.event.inputs.build_id }}\",
              \"status\": \"$STATUS\",
              \"download_url\": \"$DOWNLOAD_URL\"
            }"
